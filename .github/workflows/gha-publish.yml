name: GHA Publish

on:
  workflow_call:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.0)'
        required: true
        type: string
      action-name:
        description: 'Human readable action name (e.g., "Visual Studio VSIX Versioner")'
        required: true
        type: string
      node-version-file:
        description: 'Path to Node version file (default: .node-version)'
        required: false
        type: string
        default: '.node-version'

jobs:
  changelog:
    uses: CodingWithCalvin/.github/.github/workflows/generate-changelog.yml@main
    secrets: inherit

  release:
    needs: changelog
    runs-on: ubuntu-latest
    outputs:
      version: ${{ inputs.version }}

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: ${{ inputs.node-version-file }}
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Rebuild dist
        run: npm run bundle

      - name: Commit dist changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dist/
          git diff --staged --quiet || git commit -m "chore: rebuild dist for v${{ inputs.version }}"
          git push

      - name: Create and push tag
        run: |
          git tag v${{ inputs.version }}
          git push origin v${{ inputs.version }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: v${{ inputs.version }}
          name: v${{ inputs.version }}
          body: ${{ needs.changelog.outputs.changelog }}


